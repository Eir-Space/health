      details: "28 dec 2020 Anteckningar Besöks­anteckning SLSO- Danderyds VC Nytt Besöksanteckning 2020-12-28 12:53 Ladda ner Antecknad av Kristina Sund (Läkare) SLSO- Danderyds VC Besök Kontakttyp Planerat mottagni..."
      notes:
        - "28 dec 2020 Anteckningar Besöks­anteckning SLSO- Danderyds VC Nytt Besöksanteckning 2020-12-28 12:53 Ladda ner Antecknad av Kristina Sund (Läkare) SLSO- Danderyds VC Besök Kontakttyp Planerat mottagningsbesök Kontaktorsak Önskar bedömning av finger efter ett fall 23/12 Aktuellt Pat som föll i en trappa 23/12 och tog emot sig med båda händerna, dorsalsidan av höger hand. Sedan dess haft lite ont i ffa hö långfinger och önskar en bedömning varför bokat tid idag. Upplever ingen rörelseinskränkning, känselnedsättning eller nedsatt kraft. Tar även upp ont till vä i halsen sedan igår. Status Allmäntillstånd Gott, opåverkat. Munhåla och svalg Inspekteras med normalfuktade slemhinnor, oretade förhållanden. Tonsiller insp u.a. Ytliga lymfkörtlar Palp u.a. huvud, hals. Lokalstatus Hö hand: ingen felställning, svullnad, hematom eller sår. God rörlighet. Ingen extensions- eller flektionsdefekt. God kapillär återfyllnad samtliga fingrar. God känsel och grov kraft. Diskret palpationsömhet diffust över lång- och ringfinger. Skelettet palperas utan hak eller asymmetri. Ingen svullnad eller värk över MCP- eller IP-leder. 2PD 4mm u.a. samtliga fingrar. Bedömning Trauma mot höger hand för 5d sedan. Status väs u.a. Ingen misstanke om allvarlig skada. Ger lugnande besked. Ont i halsen sedan igår vid en specifik punkt. Inget avvikande i status. Råder till expektans. Uppföljning Ingen planerad. Åter vid behov. Ladda ner Stäng"
    attachments:
[]
    tags:
      - "anteckningar"
      - "besök"
